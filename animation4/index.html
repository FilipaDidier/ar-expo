<script id="cfg-data" type="application/json">{"P":{"growthSpeed":0.5,"curviness":0.24,"branchDepth":4,"subBranches":4,"subSubBranches":5,"spreadAngle":26,"lengthDecay":0.55,"branchWidth":7,"postSway":0.3,"swaySpeed":0.4,"swayDuration":4,"nodeCount":60,"connDist":130,"connOpacity":0.6,"nodeSize":3,"twinkle":0.5,"moveSpeed":0.4,"dropCount":120,"fallSpeed":4,"dropLen":22,"windAng":5,"rippleCount":5,"rippleSpeed":1.5,"maxRad":150,"rippleW":1.5,"ffCount":40,"glowSize":14,"ffSpeed":0.8,"flicker":0.04,"particleCount":500,"flowSpeed":1,"noiseScale":0.006,"trailLen":8,"color1":"#341af9","color2":"#6a9bcc","opacity":0.9},"branches":[{"sx":0.37736966824644547,"sy":0.42890995260663506,"sz":-1,"ex":0.3726303317535545,"ey":0.29857819905213273,"ez":0},{"sx":0.6072274881516587,"sy":0.3483412322274882,"sz":-1,"ex":0.5882701421800948,"ey":-0.05213270142180088,"ez":1},{"sx":0.375,"sy":0.7345971563981042,"sz":-1,"ex":0.3963270142180094,"ey":1.0853080568720377,"ez":-0.85}],"aspect":0.6,"imgOx":-6.735002234692893e-17,"imgOy":0.1998577524893314,"imgSw":1.0000000000000002,"imgSh":0.6002844950213372}</script>
<script>const CFG=JSON.parse(document.getElementById("cfg-data").textContent);
const P=CFG.P;
function hRGB(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function rgba(h,a){var c=hRGB(h);return"rgba("+c.r+","+c.g+","+c.b+","+a+")";}
function bez(p0,p1,p2,p3,t){var m=1-t;return m*m*m*p0+3*m*m*t*p1+3*m*t*t*p2+t*t*t*p3;}
function bezD(p0,p1,p2,p3,t){var m=1-t;return 3*m*m*(p1-p0)+6*m*t*(p2-p1)+3*t*t*(p3-p2);}
function fh(n){var s=Math.sin(n*127.1)*43758.5453;return s-Math.floor(s);}
function prj(nx,ny,nz,W,H){var persp=900,ds=Math.min(W,H)*0.5,x=nx*W-W/2,y=ny*H-H/2,z=(nz+1)/2*ds,scale=persp/(persp-z);return{x:x*scale+W/2,y:y*scale+H/2};}
function buildNode(sx,sy,sz,ex,ey,ez,depth,seed){var dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy)||0.001,px=-dy/len,py=dx/len,r1=fh(seed)-0.5,r2=fh(seed*1.618)-0.5,minDev=0.3,d1=(r1<0?-1:1)*Math.max(Math.abs(r1),minDev)*2*P.curviness,d2=(r2<0?-1:1)*Math.max(Math.abs(r2),minDev)*2*P.curviness,node={sx:sx,sy:sy,sz:sz,ex:ex,ey:ey,ez:ez,cp1x:sx+dx*0.33+px*len*d1,cp1y:sy+dy*0.33+py*len*d1,cp2x:sx+dx*0.67+px*len*d2,cp2y:sy+dy*0.67+py*len*d2,depth:depth,children:[]};if(depth>1){var n=(depth===P.branchDepth)?P.subBranches:P.subSubBranches,spread=P.spreadAngle*Math.PI/180;for(var i=0;i<n;i++){var tOrig=0.1+0.4*(i/(n-1)),ox2=bez(sx,node.cp1x,node.cp2x,ex,tOrig),oy2=bez(sy,node.cp1y,node.cp2y,ey,tOrig),oz2=sz+(ez-sz)*tOrig,tdx=bezD(sx,node.cp1x,node.cp2x,ex,tOrig),tdy=bezD(sy,node.cp1y,node.cp2y,ey,tOrig),tang=Math.atan2(tdy,tdx),side=(i%2===0)?1:-1,sideAngle=spread*(0.25+fh(seed*2.1+i*5.7)*0.55),ang=tang+side*sideAngle,clen=Math.min(len*P.lengthDecay,len*(1-tOrig)*1.1);node.children.push({tOrig:tOrig,node:buildNode(ox2,oy2,oz2,ox2+Math.cos(ang)*clen,oy2+Math.sin(ang)*clen,oz2+(i-n/2)*0.04,depth-1,seed*31+i*17+depth*7)});}}return node;}
function drawNode(ctx,W,H,node,growthFront,t,odx,ody,lwScale){if(!node||growthFront<=0)return;odx=odx||0;ody=ody||0;lwScale=lwScale||1;var gf=Math.min(1,growthFront),swayAngle=0;if(growthFront>1&&P.postSway>0){var overshoot=growthFront-1,decayFrac=P.swayDuration>0?Math.max(0,1-overshoot/P.swayDuration*2):1;swayAngle=Math.sin(t*P.swaySpeed*0.06+node.sx*0.8+node.sy*0.5)*P.postSway*0.3*decayFrac;}function applyT(rx,ry){var lx=rx-node.sx,ly=ry-node.sy;if(swayAngle===0)return{x:rx+odx,y:ry+ody};return{x:node.sx+odx+lx*Math.cos(swayAngle)-ly*Math.sin(swayAngle),y:node.sy+ody+lx*Math.sin(swayAngle)+ly*Math.cos(swayAngle)};}var steps=Math.max(8,Math.round(24*gf)),baseW=Math.max(0.2,P.branchWidth*(node.depth/P.branchDepth))*lwScale,tipW=Math.max(0.05,baseW*0.08),alpha=P.opacity*(node.depth/P.branchDepth)*0.95,prev=null;ctx.save();ctx.lineCap="round";for(var i=0;i<=steps;i++){var u=(i/steps)*gf,rawBx=bez(node.sx,node.cp1x,node.cp2x,node.ex,u),rawBy=bez(node.sy,node.cp1y,node.cp2y,node.ey,u),tb=applyT(rawBx,rawBy),bz=(node.sz+(node.ez-node.sz)*u),pp=prj(tb.x,tb.y,bz,W,H),px2=pp.x,py2=pp.y;if(prev){var w=baseW+(tipW-baseW)*u;ctx.strokeStyle=rgba(P.color1,alpha);ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(prev.x,prev.y);ctx.lineTo(px2,py2);ctx.stroke();}prev={x:px2,y:py2};}ctx.restore();node.children.forEach(function(ch){var cf=Math.max(0,growthFront-ch.tOrig);if(cf<=0)return;var rawOx=bez(node.sx,node.cp1x,node.cp2x,node.ex,ch.tOrig),rawOy=bez(node.sy,node.cp1y,node.cp2y,node.ey,ch.tOrig),to=applyT(rawOx,rawOy);drawNode(ctx,W,H,ch.node,cf,t,to.x-ch.node.sx,to.y-ch.node.sy,lwScale);});}
AFRAME.registerComponent("smooth-target",{init:function(){this._sp=new THREE.Vector3();this._sq=new THREE.Quaternion();this._rdy=false;this.el.addEventListener("targetFound",function(){this._rdy=false;}.bind(this));},tick:function(){var o=this.el.object3D;if(!o.visible)return;var p=o.position,q=o.quaternion;if(!this._rdy){this._sp.copy(p);this._sq.copy(q);this._rdy=true;return;}this._sp.lerp(p,0.2);this._sq.slerp(q,0.2);p.copy(this._sp);q.copy(this._sq);}});
AFRAME.registerComponent("branch-anim",{init:function(){var aspect=CFG.aspect||1,planeH=1/aspect,ox=CFG.imgOx||0,oy=CFG.imgOy||0,sw=CFG.imgSw||1,sh=CFG.imgSh||1,maxZ=0.2,self=this;this.t=0;this.bdata=[];var CW=512,CH=Math.round(512/aspect);CFG.branches.forEach(function(b){var csx=ox+b.sx*sw,csy=oy+b.sy*sh,cex=ox+b.ex*sw,cey=oy+b.ey*sh,tree=buildNode(csx,csy,b.sz,cex,cey,b.ez,P.branchDepth,b.sx*3.1+b.sy*7.3),canvas=document.createElement("canvas"),avgZ=(b.sz+b.ez)/2*maxZ;canvas.width=CW;canvas.height=CH;var ctx=canvas.getContext("2d"),tex=new THREE.CanvasTexture(canvas);tex.minFilter=THREE.LinearFilter;var geo=new THREE.PlaneGeometry(1,planeH),mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false}),mesh=new THREE.Mesh(geo,mat);mesh.position.set(0,0,avgZ);self.el.object3D.add(mesh);self.bdata.push({tree:tree,ctx:ctx,CW:CW,CH:CH,tex:tex});});},tick:function(time,dt){this.t+=dt*0.001*60;var t=this.t,cycLen=220/P.growthSpeed,ph=(t%cycLen)/cycLen,gp=ph<0.82?(ph/0.82)*1.8:1.8,lwScale=512/400;this.bdata.forEach(function(b){b.ctx.clearRect(0,0,b.CW,b.CH);if(b.tree)drawNode(b.ctx,b.CW,b.CH,b.tree,gp,t,0,0,lwScale);b.tex.needsUpdate=true;});}});</script>
