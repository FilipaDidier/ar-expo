// BRANCH TREE BUILDER
//
// Each node = one branch segment, described by a cubic bezier curve.
// The bezier shape is FIXED at build time (seeded random control point offsets).

function buildNode(sx,sy,sz, ex,ey,ez, depth, seed){

  const len=Math.sqrt(dx*dx+dy*dy)||0.001;

function drawRain(ctx,W,H,rX,rY,parts){

function drawNode(ctx,W,H,node,growthFront,t,odx,ody,lwScale){if(!node||growthFront<=0)return;odx=odx||0;ody=ody||0;lwScale=lwScale||1;var gf=Math.min(1,growthFront),swayAngle=0;if(growthFront>1&&P.postSway>0){var overshoot=growthFront-1,decayFrac=P.swayDuration>0?Math.max(0,1-overshoot/P.swayDuration*2):1;swayAngle=Math.sin(t*P.swaySpeed*0.06+node.sx*0.8+node.sy*0.5)*P.postSway*0.3*decayFrac;}function applyT(rx,ry){var lx=rx-node.sx,ly=ry-node.sy;if(swayAngle===0)return{x:rx+odx,y:ry+ody};return{x:node.sx+odx+lx*Math.cos(swayAngle)-ly*Math.sin(swayAngle),y:node.sy+ody+lx*Math.sin(swayAngle)+ly*Math.cos(swayAngle)}}var steps=Math.max(8,Math.round(24*gf)),baseW=Math.max(0.2,P.branchWidth*(node.depth/P.branchDepth))*lwScale,tipW=Math.max(0.05,baseW*0.08),alpha=P.opacity*(node.depth/P.branchDepth)*0.95,prev=null;ctx.save();ctx.lineCap="round";for(var i=0;i<=steps;i++){var u=(i/steps)*gf,rawBx=bez(node.sx,node.cp1x,node.cp2x,node.ex,u),rawBy=bez(node.sy,node.cp1y,node.cp2y,node.ey,u),tb=applyT(rawBx,rawBy),bz=(node.sz+(node.ez-node.sz)*u),pp=prj(tb.x,tb.y,bz,W,H),px2=pp.x,py2=pp.y;if(prev){var w=baseW+(tipW-baseW)*u;ctx.strokeStyle=rgba(P.color1,alpha);ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(prev.x,prev.y);ctx.lineTo(px2,py2);ctx.stroke();}prev={x:px2,y:py2}}ctx.restore();node.children.forEach(function(ch){var cf=Math.max(0,growthFront-ch.tOrig);if(cf<=0)return;var rawOx=bez(node.sx,node.cp1x,node.cp2x,node.ex,ch.tOrig),rawOy=bez(node.sy,node.cp1y,node.cp2y,node.ey,ch.tOrig),to=applyT(rawOx,rawOy);drawNode(ctx,W,H,ch.node,cf,t,to.x-ch.node.sx,to.y-ch.node.sy,lwScale);})}
