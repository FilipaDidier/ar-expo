<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script id="cfg-data" type="application/json">{"P":{"growthSpeed":0.5,"curviness":0.24,"branchDepth":4,"subBranches":4,"subSubBranches":5,"spreadAngle":28,"lengthDecay":0.7,"branchWidth":7,"postSway":0.3,"swaySpeed":0.4,"swayDuration":4,"nodeCount":60,"connDist":130,"connOpacity":0.6,"nodeSize":3,"twinkle":0.5,"moveSpeed":0.4,"dropCount":120,"fallSpeed":4,"dropLen":22,"windAng":5,"rippleCount":5,"rippleSpeed":1.5,"maxRad":150,"rippleW":1.5,"ffCount":40,"glowSize":14,"ffSpeed":0.8,"flicker":0.04,"particleCount":500,"flowSpeed":1,"noiseScale":0.006,"trailLen":8,"color1":"#a12b2b","color2":"#6a9bcc","opacity":0.9},"branches":[{"sx":0.3735763097949886,"sy":0.4339407744874715,"sz":-1,"ex":0.357630979498861,"ey":0.23120728929384962,"ez":-0.5},{"sx":0.6036446469248291,"sy":0.34965831435079725,"sz":-1,"ex":0.7790432801822323,"ey":0.014806378132118466,"ez":0.7},{"sx":0.3826879271070615,"sy":0.7346241457858769,"sz":-1,"ex":0.29157175398633256,"ey":1.112756264236902,"ez":-0.6}],"aspect":0.6,"imgOx":0,"imgOy":0.20013661202185792,"imgSw":1,"imgSh":0.5997267759562842}</script>
    <script>
    const CFG = JSON.parse(document.getElementById('cfg-data').textContent);

    // ── Math helpers ──
    function bez(p0,p1,p2,p3,t){const m=1-t;return m*m*m*p0+3*m*m*t*p1+3*m*t*t*p2+t*t*t*p3;}
    function bezD(p0,p1,p2,p3,t){const m=1-t;return 3*m*m*(p1-p0)+6*m*t*(p2-p1)+3*t*t*(p3-p2);}
    function fh(n){const s=Math.sin(n*127.1)*43758.5453;return s-Math.floor(s);}

    // ── Build branch tree ──
    function buildNode(sx,sy,sz,ex,ey,ez,depth,seed,P){
      const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy)||0.001;
      const px=-dy/len,py=dx/len;
      const r1=fh(seed)-0.5,r2=fh(seed*1.618)-0.5;
      const minDev=0.3;
      const d1=(r1<0?-1:1)*Math.max(Math.abs(r1),minDev)*2*P.curviness;
      const d2=(r2<0?-1:1)*Math.max(Math.abs(r2),minDev)*2*P.curviness;
      const node={sx,sy,sz,ex,ey,ez,
        cp1x:sx+dx*0.33+px*len*d1,cp1y:sy+dy*0.33+py*len*d1,
        cp2x:sx+dx*0.67+px*len*d2,cp2y:sy+dy*0.67+py*len*d2,
        depth,children:[]};
      if(depth>1){
        const n=(depth===P.branchDepth)?P.subBranches:P.subSubBranches;
        const spread=P.spreadAngle*Math.PI/180;
        for(let i=0;i<n;i++){
          const tOrig=0.1+0.4*(i/(n-1));
          const ox=bez(sx,node.cp1x,node.cp2x,ex,tOrig);
          const oy=bez(sy,node.cp1y,node.cp2y,ey,tOrig);
          const oz=sz+(ez-sz)*tOrig;
          const tdx=bezD(sx,node.cp1x,node.cp2x,ex,tOrig);
          const tdy=bezD(sy,node.cp1y,node.cp2y,ey,tOrig);
          const tang=Math.atan2(tdy,tdx);
          const side=(i%2===0)?1:-1;
          const sideAngle=spread*(0.25+fh(seed*2.1+i*5.7)*0.55);
          const ang=tang+side*sideAngle;
          const clen=Math.min(len*P.lengthDecay,len*(1-tOrig)*1.1);
          node.children.push({tOrig,node:buildNode(ox,oy,oz,ox+Math.cos(ang)*clen,oy+Math.sin(ang)*clen,oz+(i-n/2)*0.04,depth-1,seed*31+i*17+depth*7,P)});
        }
      }
      return node;
    }

    AFRAME.registerComponent('smooth-target', {
      init: function(){
        this._sp = new THREE.Vector3();
        this._sq = new THREE.Quaternion();
        this._ready = false;
        this.el.addEventListener('targetFound', () => { this._ready = false; });
      },
      tick: function(){
        const obj = this.el.object3D;
        if(!obj.visible) return;
        const p = obj.position, q = obj.quaternion;
        if(!this._ready){
          this._sp.copy(p); this._sq.copy(q);
          this._ready = true; return;
        }
        this._sp.lerp(p, 0.18);
        this._sq.slerp(q, 0.18);
        p.copy(this._sp);
        q.copy(this._sq);
      }
    });

    AFRAME.registerComponent('branch-anim', {
      init: function(){
        const P = CFG.P;
        const aspect = CFG.aspect || 1;
        const planeW = 1;
        const planeH = 1 / aspect;
        const maxDepth = 0.35;
        const ox = CFG.imgOx||0, oy = CFG.imgOy||0, sw = CFG.imgSw||1, sh = CFG.imgSh||1;

        this.P = P;
        this.tick_ = 0;

        function toAR(nx, ny, nz){
          return [
            (nx - 0.5) * planeW,
            -(ny - 0.5) * planeH,
            ((nz + 1) / 2) * maxDepth
          ];
        }

        // Collect all segments with metadata
        const segs = [];
        function flattenNode(node, startTime){
          const STEPS = 12;
          for(let i=0;i<STEPS;i++){
            const u0=i/STEPS, u1=(i+1)/STEPS;
            const ax=bez(node.sx,node.cp1x,node.cp2x,node.ex,u0);
            const ay=bez(node.sy,node.cp1y,node.cp2y,node.ey,u0);
            const az=node.sz+(node.ez-node.sz)*u0;
            const bx=bez(node.sx,node.cp1x,node.cp2x,node.ex,u1);
            const by=bez(node.sy,node.cp1y,node.cp2y,node.ey,u1);
            const bz=node.sz+(node.ez-node.sz)*u1;
            segs.push({ a:toAR(ax,ay,az), b:toAR(bx,by,bz),
              t: startTime + u0, depth: node.depth });
          }
          node.children.forEach(c=> flattenNode(c.node, startTime + c.tOrig));
        }

        CFG.branches.forEach(b=>{
          const seed = b.sx*3.1+b.sy*7.3;
          const csx=ox+b.sx*sw, csy=oy+b.sy*sh;
          const cex=ox+b.ex*sw, cey=oy+b.ey*sh;
          const tree = buildNode(csx,csy,b.sz,cex,cey,b.ez,P.branchDepth,seed,P);
          flattenNode(tree, 0);
        });

        this.segs = segs;
        const N = segs.length;

        // Single geometry with 2 vertices per segment
        const positions = new Float32Array(N * 6);
        segs.forEach((s,i)=>{
          positions[i*6+0]=s.a[0]; positions[i*6+1]=s.a[1]; positions[i*6+2]=s.a[2];
          positions[i*6+3]=s.b[0]; positions[i*6+4]=s.b[1]; positions[i*6+5]=s.b[2];
        });

        // Per-vertex color array — we animate opacity by setting alpha via vertexColors
        const colors = new Float32Array(N * 8); // rgba x 2 verts
        this.colors = colors;

        const col = new THREE.Color(P.color1);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        // We'll drive visibility by moving invisible segs to origin
        // Simpler: use a single material, toggle per-segment via color alpha
        // THREE.js LineSegments uses vertexColors so we can set per-vertex alpha
        const colArr = new Float32Array(N * 6); // rgb x 2 verts
        for(let i=0;i<N*2;i++){
          colArr[i*3]=col.r; colArr[i*3+1]=col.g; colArr[i*3+2]=col.b;
        }
        geo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));

        // Store alpha separately, update positions to hide/show
        this.posAttr = geo.getAttribute('position');
        this.hiddenPos = new Float32Array(N * 6); // all zeros = origin
        this.visiblePos = positions.slice();

        const mat = new THREE.LineBasicMaterial({
          vertexColors: true,
          transparent: true,
          opacity: 1,
          depthWrite: false
        });

        const lines = new THREE.LineSegments(geo, mat);
        this.geo = geo;
        this.mat = mat;
        this.el.object3D.add(lines);

        // Start with everything hidden
        this.posAttr.array.fill(0);
        this.posAttr.needsUpdate = true;

      },

      tick: function(time, dt){
        this.tick_ += dt * 0.001;
        const P = this.P;


        const cycLen = 3.5 / P.growthSpeed;
        const ph = (this.tick_ % cycLen) / cycLen;
        const gp = ph < 0.82 ? (ph/0.82)*2.8 : 2.8;
        const fade = ph > 0.88 ? Math.max(0, 1-(ph-0.88)/0.12) : 1;

        const posArr = this.posAttr.array;
        const visArr = this.visiblePos;
        let changed = false;

        this.segs.forEach((s,i)=>{
          const dr = s.depth / P.branchDepth; const depthAlpha = P.opacity * dr * dr * 0.95;
          const visible = gp > s.t;
          const alpha = visible ? Math.min((gp-s.t)/0.08,1)*depthAlpha*fade : 0;
          // Show/hide by moving to real position or origin
          const base = i*6;
          if(alpha > 0.01){
            if(posArr[base] !== visArr[base]){
              posArr[base]=visArr[base]; posArr[base+1]=visArr[base+1]; posArr[base+2]=visArr[base+2];
              posArr[base+3]=visArr[base+3]; posArr[base+4]=visArr[base+4]; posArr[base+5]=visArr[base+5];
              changed = true;
            }
          } else {
            if(posArr[base] !== 0 || posArr[base+1] !== 0){
              posArr[base]=0;posArr[base+1]=0;posArr[base+2]=0;
              posArr[base+3]=0;posArr[base+4]=0;posArr[base+5]=0;
              changed = true;
            }
          }
          // Update material opacity won't work per-segment on LineSegments
          // Instead scale alpha into color brightness
          // Actually just use global opacity for the whole mesh and show/hide per seg
        });

        // Update global opacity for fade
        this.mat.opacity = fade * P.opacity;
        this.mat.needsUpdate = true;
        if(changed){ this.posAttr.needsUpdate = true; }
      }
    });
    </script>
  </head>
  <body style="margin:0;overflow:hidden;">
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; filterMinCF: 0.001; filterBeta: 0.1;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0" smooth-target>
        <a-entity branch-anim></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
