<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script id="cfg-data" type="application/json">{"P":{"growthSpeed":0.5,"curviness":0.24,"branchDepth":5,"subBranches":4,"subSubBranches":5,"spreadAngle":42,"lengthDecay":0.55,"branchWidth":1.5,"postSway":0.25,"swaySpeed":0.4,"swayDuration":4,"nodeCount":60,"connDist":130,"connOpacity":0.6,"nodeSize":3,"twinkle":0.5,"moveSpeed":0.4,"dropCount":120,"fallSpeed":4,"dropLen":22,"windAng":5,"rippleCount":5,"rippleSpeed":1.5,"maxRad":150,"rippleW":1.5,"ffCount":40,"glowSize":14,"ffSpeed":0.8,"flicker":0.04,"particleCount":500,"flowSpeed":1,"noiseScale":0.006,"trailLen":8,"color1":"#000c3f","color2":"#6a9bcc","opacity":0.55},"branches":[{"sx":0.37916666666666665,"sy":0.43333333333333335,"sz":-1,"ex":0.35059523809523807,"ey":0.16904761904761906,"ez":-0.4},{"sx":0.6053571428571428,"sy":0.34523809523809523,"sz":-1,"ex":0.6482142857142857,"ey":-0.1404761904761905,"ez":0.65},{"sx":0.3767857142857143,"sy":0.7404761904761904,"sz":-1,"ex":0.4791666666666667,"ey":0.4452380952380952,"ez":-0.8}],"aspect":0.6,"imgOx":0,"imgOy":0.2,"imgSw":1,"imgSh":0.6}</script>
    <script>
    const CFG = JSON.parse(document.getElementById('cfg-data').textContent);

    // ── Math helpers ──
    function bez(p0,p1,p2,p3,t){const m=1-t;return m*m*m*p0+3*m*m*t*p1+3*m*t*t*p2+t*t*t*p3;}
    function bezD(p0,p1,p2,p3,t){const m=1-t;return 3*m*m*(p1-p0)+6*m*t*(p2-p1)+3*t*t*(p3-p2);}
    function fh(n){const s=Math.sin(n*127.1)*43758.5453;return s-Math.floor(s);}

    // ── Build branch tree ──
    function buildNode(sx,sy,sz,ex,ey,ez,depth,seed,P){
      const dx=ex-sx,dy=ey-sy,len=Math.sqrt(dx*dx+dy*dy)||0.001;
      const px=-dy/len,py=dx/len;
      const r1=fh(seed)-0.5,r2=fh(seed*1.618)-0.5;
      const minDev=0.3;
      const d1=(r1<0?-1:1)*Math.max(Math.abs(r1),minDev)*2*P.curviness;
      const d2=(r2<0?-1:1)*Math.max(Math.abs(r2),minDev)*2*P.curviness;
      const node={sx,sy,sz,ex,ey,ez,
        cp1x:sx+dx*0.33+px*len*d1,cp1y:sy+dy*0.33+py*len*d1,
        cp2x:sx+dx*0.67+px*len*d2,cp2y:sy+dy*0.67+py*len*d2,
        depth,children:[]};
      if(depth>1){
        const n=(depth===P.branchDepth)?P.subBranches:P.subSubBranches;
        const spread=P.spreadAngle*Math.PI/180;
        for(let i=0;i<n;i++){
          const tOrig=0.1+0.4*(i/(n-1));
          const ox=bez(sx,node.cp1x,node.cp2x,ex,tOrig);
          const oy=bez(sy,node.cp1y,node.cp2y,ey,tOrig);
          const oz=sz+(ez-sz)*tOrig;
          const tdx=bezD(sx,node.cp1x,node.cp2x,ex,tOrig);
          const tdy=bezD(sy,node.cp1y,node.cp2y,ey,tOrig);
          const tang=Math.atan2(tdy,tdx);
          const side=(i%2===0)?1:-1;
          const sideAngle=spread*(0.25+fh(seed*2.1+i*5.7)*0.55);
          const ang=tang+side*sideAngle;
          const clen=Math.min(len*P.lengthDecay,len*(1-tOrig)*1.1);
          node.children.push({tOrig,node:buildNode(ox,oy,oz,ox+Math.cos(ang)*clen,oy+Math.sin(ang)*clen,oz+(i-n/2)*0.04,depth-1,seed*31+i*17+depth*7,P)});
        }
      }
      return node;
    }

    AFRAME.registerComponent('branch-anim', {
      init: function(){
        const P = CFG.P;
        const aspect = CFG.aspect || 1;
        const planeW = 1;
        const planeH = 1 / aspect;
        const maxDepth = 0.35; // metres branches float toward viewer at Z=+1
        const ox = CFG.imgOx||0, oy = CFG.imgOy||0, sw = CFG.imgSw||1, sh = CFG.imgSh||1;

        this.P = P;
        this.tick_ = 0;
        this.segments = [];

        // Canvas-normalized (0-1) + nz(-1..+1)  →  A-Frame 3D metres
        function toAR(nx, ny, nz){
          return new THREE.Vector3(
            (nx - 0.5) * planeW,
            -(ny - 0.5) * planeH,
            ((nz + 1) / 2) * maxDepth   // -1→0 (on canvas), +1→maxDepth (toward viewer)
          );
        }

        // Flatten branch tree into line segments
        const allSegs = [];
        function flattenNode(node, startTime){
          const STEPS = 18;
          for(let i=0;i<STEPS;i++){
            const u0=i/STEPS, u1=(i+1)/STEPS;
            const ax=bez(node.sx,node.cp1x,node.cp2x,node.ex,u0);
            const ay=bez(node.sy,node.cp1y,node.cp2y,node.ey,u0);
            const az=node.sz+(node.ez-node.sz)*u0;
            const bx=bez(node.sx,node.cp1x,node.cp2x,node.ex,u1);
            const by=bez(node.sy,node.cp1y,node.cp2y,node.ey,u1);
            const bz=node.sz+(node.ez-node.sz)*u1;
            allSegs.push({
              a: toAR(ax,ay,az), b: toAR(bx,by,bz),
              t: startTime + u0,
              depth: node.depth
            });
          }
          node.children.forEach(c=>{
            flattenNode(c.node, startTime + c.tOrig);
          });
        }

        CFG.branches.forEach(b=>{
          const seed = b.sx*3.1+b.sy*7.3;
          // b.sx/sy are image-relative, convert to canvas-normalized
          const csx=ox+b.sx*sw, csy=oy+b.sy*sh;
          const cex=ox+b.ex*sw, cey=oy+b.ey*sh;
          const tree = buildNode(csx,csy,b.sz,cex,cey,b.ez,P.branchDepth,seed,P);
          flattenNode(tree, 0);
        });

        // Build Three.js line objects
        const col = new THREE.Color(P.color1);
        allSegs.forEach(seg=>{
          const geo = new THREE.BufferGeometry().setFromPoints([seg.a, seg.b]);
          const mat = new THREE.LineBasicMaterial({
            color: col,
            transparent: true,
            opacity: 0,
            depthWrite: false
          });
          const line = new THREE.Line(geo, mat);
          this.el.object3D.add(line);
          this.segments.push({line, mat, t: seg.t, depth: seg.depth});
        });
      },

      tick: function(time, dt){
        this.tick_ += dt * 0.001;
        const P = this.P;
        const cycLen = 3.5 / P.growthSpeed;
        const ph = (this.tick_ % cycLen) / cycLen;
        // Growth front: 0→2.8 over first 82% of cycle, hold rest
        const gp = ph < 0.82 ? (ph/0.82)*2.8 : 2.8;
        // Fade out in last 18%
        const fade = ph > 0.88 ? Math.max(0, 1-(ph-0.88)/0.12) : 1;

        this.segments.forEach(s=>{
          const depthAlpha = P.opacity * (s.depth / P.branchDepth) * 0.95;
          let op = 0;
          if(gp > s.t){
            op = Math.min((gp - s.t) / 0.08, 1) * depthAlpha * fade;
          }
          if(s.mat.opacity !== op){
            s.mat.opacity = op;
            s.mat.needsUpdate = true;
          }
        });
      }
    });
    </script>
  </head>
  <body style="margin:0;overflow:hidden;">
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity branch-anim></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
